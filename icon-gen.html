<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<script>
function drawTree(canvas) {
  const SIZE = canvas.width;
  const ctx = canvas.getContext('2d');
  const CX = SIZE / 2, CY = SIZE / 2;
  const SCALE = SIZE / 500;
  const COLOR = '#2d6a4f';
  const SW = 1.8 * SCALE;

  // Beige background
  ctx.fillStyle = '#f4f2ed';
  ctx.fillRect(0, 0, SIZE, SIZE);

  ctx.strokeStyle = COLOR;
  ctx.lineWidth = SW;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  function deg2rad(d) { return d * Math.PI / 180; }
  function pt(r, deg) {
    const a = deg2rad(deg);
    return { x: CX + r * SCALE * Math.cos(a), y: CY + r * SCALE * Math.sin(a) };
  }

  function drawArc(r, a1, a2) {
    ctx.beginPath();
    ctx.arc(CX, CY, r * SCALE, deg2rad(a1), deg2rad(a2), false);
    ctx.stroke();
  }

  function drawLine(r1, r2, deg) {
    const p1 = pt(r1, deg), p2 = pt(r2, deg);
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
  }

  function leaf(angle) { return { leaf: true, angle }; }
  function node(...ch) { return { children: ch }; }

  const TREE = node(
    node(node(leaf(0), leaf(20)), node(leaf(42), leaf(62))),
    node(node(node(leaf(84), leaf(104)), leaf(126)), node(leaf(148), leaf(168))),
    node(node(leaf(188), leaf(208)), node(leaf(228), leaf(248))),
    node(node(leaf(268), leaf(288)), node(node(leaf(308), leaf(328)), leaf(348)))
  );

  function computeAngles(n) {
    if (n.leaf) { n.minA = n.maxA = n.mid = n.angle; return; }
    n.children.forEach(computeAngles);
    n.minA = Math.min(...n.children.map(c => c.minA));
    n.maxA = Math.max(...n.children.map(c => c.maxA));
    n.mid  = (n.minA + n.maxA) / 2;
  }
  computeAngles(TREE);

  const DEPTH_R = [42, 80, 116, 146, 166];
  const LEAF_R  = 182;
  const LEAF_TIP = 204;

  function assignR(n, depth) {
    if (n.leaf) { n.r = LEAF_R; return; }
    n.r = DEPTH_R[Math.min(depth, DEPTH_R.length - 1)];
    n.children.forEach(c => assignR(c, depth + 1));
  }
  assignR(TREE, 0);

  function drawNode(n) {
    if (n.leaf) {
      drawLine(n.r, LEAF_TIP, n.angle);
      // small dot
      const p = pt(LEAF_TIP + 3, n.angle);
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2.5 * SCALE, 0, Math.PI * 2);
      ctx.fillStyle = COLOR;
      ctx.fill();
      return;
    }
    const mids = n.children.map(c => c.mid).sort((a, b) => a - b);
    drawArc(n.r, mids[0], mids[mids.length - 1]);
    n.children.forEach(c => {
      drawLine(n.r, c.r, c.mid);
      drawNode(c);
    });
  }

  // Centre spiral
  drawArc(38, 30, 310);
  drawArc(20, 60, 290);
  drawLine(38, 20, 30);
  drawLine(38, 20, 310);

  // Spokes + tree
  TREE.children.forEach(c => {
    drawLine(38, c.r, c.mid);
    drawNode(c);
  });

  // Centre dot
  ctx.beginPath();
  ctx.arc(CX, CY, 4 * SCALE, 0, Math.PI * 2);
  ctx.fillStyle = COLOR;
  ctx.fill();
}

drawTree(document.getElementById('c512'));
drawTree(document.getElementById('c192'));

// Expose base64 data
window.png512 = document.getElementById('c512').toDataURL('image/png').split(',')[1];
window.png192 = document.getElementById('c192').toDataURL('image/png').split(',')[1];
</script>
</body>
</html>
